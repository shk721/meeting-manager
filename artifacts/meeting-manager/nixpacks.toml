[phases.setup]
cmds = ["corepack enable && corepack prepare pnpm@10 --activate"]

[phases.install]
cmds = ["cd /app && pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = ["cd /app && pnpm --filter @workspace/meeting-manager run build"]

[start]
cmd = "npx serve artifacts/meeting-manager/dist/public -l $PORT"
