[phases.install]
cmds = ["corepack enable && corepack prepare pnpm@10 --activate && pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm --filter @workspace/meeting-manager run build",
  "BASE_PATH=/dt/ pnpm --filter @workspace/dt-dashboard run build",
  "BASE_PATH=/committees/ pnpm --filter @workspace/committees run build",
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "pnpm --filter @workspace/db run push-force && NODE_ENV=production node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
