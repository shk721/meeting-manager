[phases.install]
cmds = ["corepack enable && corepack prepare pnpm@10 --activate && pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm --filter @workspace/db run push-force",
  "pnpm --filter @workspace/meeting-manager run build",
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "NODE_ENV=production node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
